<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nonogram Puzzle</title>
    <style>
        body {
            background-color: rgba(255, 255, 255, 0.8);
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .puzzle {
            margin: 20px;
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 2px;
        }
        .cell {
            width: 30px;
            height: 30px;
            background-color: #fff;
            border: 1px solid #ccc;
        }
        .animated {
            animation: slideshow 3s infinite;
        }
        @keyframes slideshow {
            0% { opacity: 0.9; }
            50% { opacity: 1; }
            100% { opacity: 0.9; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to the Nonogram Puzzle</h1>
    </header>
    <main class="animated">
        <div class="puzzle">
            <!-- Puzzle cells go here -->
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <!-- Repeat for more cells -->
        </div>
    </main>
    <footer>
        <p>Updated on 2026-03-13 20:15:34 UTC</p>
    </footer>
</body>
</html>
